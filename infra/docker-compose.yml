# Stack completa na mesma EC2 (um único Docker Compose). Amazon Linux com SELinux: mounts usam :z no host.
# Comunicação na rede Docker:
#   - api (login-api) e server (Canary) ligam ao MySQL em database:3306.
#   - site faz proxy /api -> api:8080.
# O login-api NÃO contacta o Canary por HTTP/TCP: só devolve ao cliente OT o IP/porta
# (OT_GAMESERVER_* em otserver-web/.env). Esse valor tem de ser alcançável pelo jogador
# (ex.: meuotserver.com.br ou IP elástico), não o hostname Docker "server".
#
# Pré-requisito: submódulos Git (canary + otserver-web) — senão o build da API falha.
#   git clone --recurse-submodules https://github.com/rodviana/tibia.git
#   # ou, já clonado: git submodule update --init --recursive
# Canary: branch padrão do submódulo = rodrigo (.gitmodules). stack-refresh com --remote segue essa branch.
#
# .env: infra/mysql/.env, infra/canary/.env, infra/otserver-web/.env
# Ambientes alternativos: usa --env-file infra/environments/<nome>.compose.env
# e aponta MYSQL_ENV_FILE / CANARY_ENV_FILE / OTSERVER_WEB_ENV_FILE para os ficheiros desejados.
# Arranque: ./infra/up.sh   (cria .env em falta e sincroniza submódulos)
#
# Na raiz do repositório:
#   docker compose -f infra/docker-compose.yml up -d --build
#
# Para subir um ambiente alternativo (ex.: local):
#   docker compose --env-file infra/environments/local.compose.env -f infra/docker-compose.yml up -d --build
#
# Em alternativa, podes continuar a usar os três compose separados (mysql primeiro;
# depois canary e otserver-web com rede externa ot-mysql-net).
#
# Site público: SG da EC2 com TCP 80 (e 443 se terminares TLS na origem).
# Cliente Tibia: abre TCP da porta de login (7171) e da porta de jogo (7172) — só 7171 faz login; ao escolher
# personagem o cliente liga à 7172 (OT_GAMESERVER_PORT / gameProtocolPort). Sem 7172 parece "erro ao entrar".
# Cloudflare proxy: OT_SECURITY_TRUSTFORWARDHEADERS=true em infra/otserver-web/.env; SSL na Cloudflare
# "Flexible" ou "Full" conforme tiveres certificado na origem. Portas 7171/7172 não passam pelo proxy HTTP.

name: ot-stack

services:
  database:
    image: mariadb:lts
    restart: unless-stopped
    env_file:
      - ${MYSQL_ENV_FILE:-mysql/.env}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../canary/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
      # Tabelas Znote (signup/login-api, site): só corre em volume vazio na 1.ª subida.
      - ./mysql/init/02-znote.sql:/docker-entrypoint-initdb.d/02-znote.sql:ro,z
    ports:
      - "${MYSQL_PUBLISH_ADDRESS:-127.0.0.1}:${MYSQL_PUBLISH_PORT:-3306}:3306"
    networks:
      - internal
    # Primeira subida: import do schema.sql pode levar vários minutos na EC2 — margem larga.
    # Se ficar unhealthy: docker logs <container-database>; volume a meio: docker compose down -v e volta a subir.
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s

  server:
    image: ${CANARY_IMAGE:-ghcr.io/opentibiabr/canary:latest}
    entrypoint: ["/bin/bash", "/canary/start-local.sh"]
    restart: unless-stopped
    env_file:
      - ${CANARY_ENV_FILE:-canary/.env}
    volumes:
      # Ficheiro versionado em infra/canary/ (não no submódulo). Se o caminho no host
      # for um diretório, Docker criou-o porque o ficheiro não existia — apaga e volta a subir.
      - ./canary/start-local.sh:/canary/start-local.sh:ro,z
      # rateExp e resto da config: vem do host (./infra/up.sh cria a partir de config.lua.dist se faltar).
      - ../canary/config.lua:/canary/config.lua:ro,z
      - ../canary/data:/canary/data:z
      - ../canary/data-canary:/canary/data-canary:z
      - ../canary/data-otservbr-global:/canary/data-otservbr-global:z
      - ../canary/key.pem:/canary/key.pem:ro,z
      - ../canary/schema.sql:/canary/schema.sql:ro,z
    ulimits:
      core: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${GAME_PUBLISH_ADDRESS:-0.0.0.0}:${OT_SERVER_LOGIN_PORT:-7171}:${OT_SERVER_LOGIN_PORT:-7171}"
      - "${GAME_PUBLISH_ADDRESS:-0.0.0.0}:${OT_SERVER_GAME_PORT:-7172}:${OT_SERVER_GAME_PORT:-7172}"
    networks:
      - internal
    depends_on:
      database:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: infra/otserver-web/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ${OTSERVER_WEB_ENV_FILE:-otserver-web/.env}
    ports:
      - "${API_PUBLISH_ADDRESS:-127.0.0.1}:${API_PUBLISH_PORT:-8080}:8080"
    networks:
      - internal
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/check >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  site:
    build:
      context: ..
      dockerfile: infra/otserver-web/Dockerfile.site
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "${SITE_PUBLISH_ADDRESS:-0.0.0.0}:${SITE_HTTP_PORT:-80}:80"
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
