# Canary a partir do submódulo ../canary: build da imagem + config.lua do host.
#
# Uso (raiz do repo):
#   ./infra/up.sh --canary-local
#   ./infra/up.sh --env local --canary-local
#
# Token GitHub (vcpkg): ficheiro em infra/canary/secrets/github_token.txt ou GITHUB_TOKEN_FILE.
# Apple Silicon: definir CANARY_DOCKERFILE=Dockerfile.arm ou build com --platform linux/amd64.

services:
  server:
    image: ${CANARY_LOCAL_IMAGE:-ot-stack-canary:local}
    build:
      context: ../canary
      dockerfile: docker/${CANARY_DOCKERFILE:-Dockerfile.x86}
      secrets:
        - github_token
      args:
        VCPKG_FEED_URL: ${VCPKG_FEED_URL:-https://nuget.pkg.github.com/opentibiabr/index.json}
        VCPKG_FEED_USERNAME: ${VCPKG_FEED_USERNAME:-opentibiabr}
        VCPKG_BINARY_SOURCES: ${VCPKG_BINARY_SOURCES:-clear;nuget,https://nuget.pkg.github.com/opentibiabr/index.json,read;nugettimeout,1200}
    volumes:
      - ../canary/config.lua:/canary/config.lua:ro

secrets:
  github_token:
    file: ${GITHUB_TOKEN_FILE:-canary/secrets/github_token.txt}
