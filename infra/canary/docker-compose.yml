# Canary (OTServ) — liga ao MySQL na rede Docker ot-mysql-net (serviço "database").
#
# Ordem: infra/mysql (docker compose up) antes disto.
# Stack tudo-em-um: ../docker-compose.yml na pasta infra.
#
# AWS: no Security Group, abrir OT_SERVER_LOGIN_PORT e OT_SERVER_GAME_PORT (ex. 7171/7172).
# OT_SERVER_IP no .env: domínio (ex. meuotserver.com.br) ou IP público que o cliente usa para o mundo.

name: ot-canary

services:
  server:
    image: ${CANARY_IMAGE:-ghcr.io/opentibiabr/canary:latest}
    restart: unless-stopped
    env_file:
      - .env
    ulimits:
      core: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${GAME_PUBLISH_ADDRESS:-0.0.0.0}:${OT_SERVER_LOGIN_PORT:-7171}:${OT_SERVER_LOGIN_PORT:-7171}"
      - "${GAME_PUBLISH_ADDRESS:-0.0.0.0}:${OT_SERVER_GAME_PORT:-7172}:${OT_SERVER_GAME_PORT:-7172}"
    networks:
      - mysql
    # start.sh já espera pelo MySQL antes de subir o binário.

networks:
  mysql:
    name: ot-mysql-net
    external: true
