# Build local da imagem Canary (vcpkg + token GitHub para pacotes).
#
#   echo SEU_GITHUB_TOKEN > secrets/github_token.txt
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build
# Depois do build, aponta CANARY_IMAGE para a imagem gerada (ex.: ot-canary-server) ou:
#   docker tag ot-canary-server:latest local/canary:built
#   CANARY_IMAGE=local/canary:built docker compose -f docker-compose.yml up -d
#
# Ajuste VCPKG_FEED_* se o fork usar outro owner no GitHub Packages.

services:
  server:
    build:
      context: ../../canary
      dockerfile: docker/Dockerfile.x86
      secrets:
        - github_token
      args:
        VCPKG_FEED_URL: ${VCPKG_FEED_URL:-https://nuget.pkg.github.com/opentibiabr/index.json}
        VCPKG_FEED_USERNAME: ${VCPKG_FEED_USERNAME:-opentibiabr}
        VCPKG_BINARY_SOURCES: ${VCPKG_BINARY_SOURCES:-clear;nuget,https://nuget.pkg.github.com/opentibiabr/index.json,read;nugettimeout,1200}

secrets:
  github_token:
    file: ${GITHUB_TOKEN_FILE:-./secrets/github_token.txt}
