# Build local da imagem Canary (contexto = submódulo ../../canary).
# Preferível: ./infra/up.sh --canary-local (usa infra/docker-compose.canary-local.yml + monta canary/config.lua).
#
# Token NuGet opcional: echo TOKEN > secrets/github_token.txt — sem token, vcpkg compila a partir do código (mais lento).
# Desde infra/canary/: touch secrets/github_token.txt && docker compose -f docker-compose.yml -f docker-compose.build.yml build
#
# Ajuste VCPKG_FEED_* se o fork usar outro owner no GitHub Packages.

services:
  server:
    build:
      context: ../../canary
      dockerfile: docker/Dockerfile.x86
      secrets:
        - github_token
      args:
        VCPKG_FEED_URL: ${VCPKG_FEED_URL:-https://nuget.pkg.github.com/opentibiabr/index.json}
        VCPKG_FEED_USERNAME: ${VCPKG_FEED_USERNAME:-opentibiabr}
        VCPKG_BINARY_SOURCES: ${VCPKG_BINARY_SOURCES:-clear;nuget,https://nuget.pkg.github.com/opentibiabr/index.json,read;nugettimeout,1200}

secrets:
  github_token:
    file: ${GITHUB_TOKEN_FILE:-./secrets/github_token.txt}
